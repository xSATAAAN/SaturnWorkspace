name = "saturnws-auth"
account_id = "0665376659b7e5b47ccc2114b25f75a6"
main = "src/index.ts"
compatibility_date = "2026-05-04"
workers_dev = false
preview_urls = false
routes = [
  { pattern = "auth.saturnws.com/*", zone_name = "saturnws.com" },
  { pattern = "saturnws.com/auth/*", zone_name = "saturnws.com" },
  { pattern = "admin-api.saturnws.com/auth/*", zone_name = "saturnws.com" }
]

services = [
  { binding = "POLICY_SERVICE", service = "saturnws-policy" }
]

[[ratelimits]]
name = "AUTH_RATE_LIMIT_STANDARD"
namespace_id = "41001"
  [ratelimits.simple]
  limit = 20
  period = 60

[[ratelimits]]
name = "AUTH_RATE_LIMIT_SENSITIVE"
namespace_id = "41002"
  [ratelimits.simple]
  limit = 5
  period = 60

[[ratelimits]]
name = "AUTH_RATE_LIMIT_DEVICE"
namespace_id = "41003"
  [ratelimits.simple]
  limit = 12
  period = 60

[observability]
enabled = true

[vars]
APP_ENV = "production"
ALLOW_ORIGIN = "https://saturnws.com,https://www.saturnws.com,https://admin.saturnws.com"
DEVICE_LOGIN_URL = "https://saturnws.com/account/signin"
FIREBASE_AUTH_HELPER_ORIGIN = "https://saturnws-1.firebaseapp.com"
FIREBASE_PROJECT_ID = "saturnws-1"
EMAIL_AUTH_ENABLED = "true"
EMAIL_SECURITY_ENABLED = "true"
GMAIL_READONLY_OAUTH_ENABLED = "false"
AUTH_EMAIL_ENQUEUE_URL = "https://api.saturnws.com/v1/internal/email/auth/enqueue"
ACCOUNT_TERMS_VERSION = "2026-07"
PROFILE_DEFAULT_LOCALE = "ar"
APP_SESSION_TTL_DAYS = "30"
