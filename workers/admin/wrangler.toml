name = "saturnws-admin"
account_id = "0665376659b7e5b47ccc2114b25f75a6"
main = "src/index.js"
compatibility_date = "2026-05-01"
workers_dev = false

routes = [
  { pattern = "admin.saturnws.com/*", zone_name = "saturnws.com" },
  { pattern = "saturnws.com/admin", zone_name = "saturnws.com" },
  { pattern = "saturnws.com/admin/*", zone_name = "saturnws.com" },
  { pattern = "saturnws.com/updates/*", zone_name = "saturnws.com" },
  { pattern = "updates.saturnws.com/*", zone_name = "saturnws.com" },
  { pattern = "admin-api.saturnws.com/api/*", zone_name = "saturnws.com" }
]

[[r2_buckets]]
binding = "OTA_BUCKET"
bucket_name = "saturnws-ota"

[[services]]
binding = "POLICY_WORKER"
service = "saturnws-policy"

[[ratelimits]]
name = "ADMIN_RATE_LIMIT_PAYMENT_CREATE"
namespace_id = "41011"
  [ratelimits.simple]
  limit = 25
  period = 60

[[ratelimits]]
name = "ADMIN_RATE_LIMIT_DOWNLOAD"
namespace_id = "41012"
  [ratelimits.simple]
  limit = 20
  period = 60

[[ratelimits]]
name = "ADMIN_RATE_LIMIT_READ"
namespace_id = "41013"
  [ratelimits.simple]
  limit = 80
  period = 60

[[ratelimits]]
name = "ADMIN_RATE_LIMIT_CRASH_INGEST"
namespace_id = "41014"
  [ratelimits.simple]
  limit = 120
  period = 60

[vars]
ADMIN_ORIGIN = "https://admin.saturnws.com"
PUBLIC_UPDATES_BASE_URL = "https://saturnws.com/updates"
MAX_UPLOAD_MB = "150"
PAYMENTS_ALLOWED_ORIGIN = "https://saturnws.com"
EMAIL_SECURITY_ENABLED = "true"
ADMIN_EMAIL_ENQUEUE_URL = "https://api.saturnws.com/v1/internal/email/auth/enqueue"
# ADMIN_EMAIL_ALLOWLIST = ""
# ADMIN_API_TOKEN = ""
# ADMIN_EMAIL_ENQUEUE_TOKEN is configured as a Worker secret.
# ADMIN_LAYER1_USERNAME = "set_as_secret"
# ADMIN_LAYER1_PASSWORD = "set_as_secret"
# ADMIN_LAYER1_SESSION_SECRET = "set_as_secret"
# SUPABASE_URL = ""
# SUPABASE_SERVICE_ROLE_KEY = ""
# CRASH_INGEST_TOKEN = ""
# FIREBASE_PROJECT_ID = "saturnws"
# FIREBASE_WEB_API_KEY = "set_as_secret"
