name = "satan-toolkit-ota-admin"
main = "src/index.js"
compatibility_date = "2026-05-01"

routes = [
  { pattern = "admin.satantoolkit.com/*", zone_name = "satantoolkit.com" },
  { pattern = "satantoolkit.com/updates/*", zone_name = "satantoolkit.com" },
  { pattern = "admin-api.satantoolkit.com/api/*", zone_name = "satantoolkit.com" }
]

# NOTE: R2 binding is temporarily disabled for deployability on accounts
# where R2 isn't enabled yet. Re-enable after activating R2 in dashboard.
# [[r2_buckets]]
# binding = "OTA_BUCKET"
# bucket_name = "satan-toolkit-ota"

[vars]
ADMIN_ORIGIN = "https://admin.satantoolkit.com"
PUBLIC_UPDATES_BASE_URL = "https://satantoolkit.com/updates"
MAX_UPLOAD_MB = "150"
PAYMENTS_ALLOWED_ORIGIN = "https://satantoolkit.com"
